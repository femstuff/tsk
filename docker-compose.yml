services:
  postgres:
    image: postgres:16-alpine
    container_name: tsk-postgres
    environment:
      POSTGRES_DB: tsk
      POSTGRES_USER: tsk
      POSTGRES_PASSWORD: tsk
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsk -d tsk"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tsk-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  backend-api:
    build:
      context: ./apps/backend-api
    container_name: tsk-backend-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # whisper-api не в depends_on: иначе любой up backend тянет тяжёлый образ/старт Whisper.
      # Для голоса: поднимите whisper отдельно — `docker compose up -d whisper-api` и дождитесь health.
    environment:
      APP_ENV: local
      APP_PORT: 8080
      DATABASE_URL: postgres://tsk:tsk@postgres:5432/tsk?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /var/lib/tsk/storage
      APPROVAL_EMAIL: ops@example.local
      # Задайте в файле `.env` в корне репозитория: BITRIX_WEBHOOK_URL=https://...bitrix24.ru/rest/1/.../
      BITRIX_WEBHOOK_URL: ${BITRIX_WEBHOOK_URL:-}
      BITRIX_OAUTH_CLIENT_ID: ${BITRIX_OAUTH_CLIENT_ID:-}
      BITRIX_OAUTH_CLIENT_SECRET: ${BITRIX_OAUTH_CLIENT_SECRET:-}
      BITRIX_PORTAL_DOMAIN: ${BITRIX_PORTAL_DOMAIN:-}
      BITRIX_OAUTH_REDIRECT_URI: ${BITRIX_OAUTH_REDIRECT_URI:-}
      BITRIX_MOBILE_APP_SCHEME: ${BITRIX_MOBILE_APP_SCHEME:-tsk}
      BITRIX_DEAL_ESTIMATE_FIELD: ${BITRIX_DEAL_ESTIMATE_FIELD:-}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      WHISPER_BASE_URL: http://whisper-api:8000
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    ports:
      - "8080:8080"
    volumes:
      - backend-storage:/var/lib/tsk/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  whisper-api:
    build: ./transc-python-service
    container_name: tsk-whisper-api
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read(8)\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 25
      start_period: 300s
    restart: unless-stopped

  admin-web:
    build:
      context: ./apps/admin-web
    container_name: tsk-admin-web
    depends_on:
      backend-api:
        condition: service_healthy
    ports:
      - "5173:4173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mobile-workspace:
    profiles:
      - mobile
    build:
      context: ./apps/mobile-app
    container_name: tsk-mobile-workspace
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tsk-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      backend-api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: tsk-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  telegram-bot:
    profiles:
      - legacy-poc
    build: ./bot-service
    container_name: telegram-bot
    depends_on:
      whisper-api:
        condition: service_healthy
    env_file:
      - ./bot-service/.env
    environment:
      WHISPER_API_URL: http://whisper-api:8000
    restart: unless-stopped

volumes:
  backend-storage:
  grafana-data:
  postgres-data:
  prometheus-data:
